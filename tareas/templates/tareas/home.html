<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Defino el tipo de caracteres para que el navegador reconozca tildes y ñ -->
    <meta charset="UTF-8">

    <!-- Pongo el título que aparecerá en la pestaña del navegador -->
    <title>Gestor de Proyectos</title>

    <!-- Importo Bootstrap desde internet para poder usar estilos bonitos rápidamente -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- Comienzo el cuerpo de mi página web -->
<body class="bg-light">

    <!-- Creo un contenedor principal usando Bootstrap -->
    <div class="container mt-5">

        <!-- Título principal de mi aplicación -->
        <h1 class="text-center mb-4">Gestor de Proyectos</h1>

        <!-- Breve descripción de la aplicación -->
        <p class="text-center">
            En esta aplicación podré gestionar proyectos y tareas utilizando Django.
        </p>

        <!-- Aquí comienzo a construir los widgets del dashboard -->
        <div class="row mt-5">

            <!-- Widget total de proyectos -->
            <div class="col-md-4">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5 class="card-title">Proyectos</h5>
                        <!-- Aquí muestro el número de proyectos desde la base de datos -->
                        <h2>{{ total_proyectos }}</h2>
                    </div>
                </div>
            </div>

            <!-- Widget total de tareas -->
            <div class="col-md-4">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5 class="card-title">Tareas</h5>
                        <!-- Aquí muestro el número total de tareas -->
                        <h2>{{ total_tareas }}</h2>
                    </div>
                </div>
            </div>

            <!-- Widget tareas pendientes -->
            <div class="col-md-4">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5 class="card-title">Pendientes</h5>
                        <!-- Aquí muestro las tareas que aún no están completadas -->
                        <h2>{{ tareas_pendientes }}</h2>
                    </div>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
