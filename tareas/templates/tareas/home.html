<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- Aquí defino el título que aparecerá en la pestaña del navegador -->
    <title>Gestor de Proyectos</title>

    <!-- Aquí conecto Bootstrap para mejorar el diseño visual de mi página -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Aquí creo un contenedor principal con margen superior e inferior -->
    <div class="container py-5">

        <!-- Aquí centro el contenido principal de la página -->
        <div class="text-center mb-5">

            <!-- Aquí muestro el título principal de mi sistema -->
            <h1 class="display-4 fw-bold mb-3">Gestor de Proyectos</h1>

            <!-- Aquí muestro una breve descripción de la aplicación -->
            <p class="lead text-muted">
                En esta aplicación podré gestionar proyectos y tareas utilizando Django.
            </p>
        </div>

        <!-- Aquí creo una fila para mostrar mis widgets principales -->
        <div class="row g-4 justify-content-center mb-5">

            <!-- Aquí muestro el widget de proyectos -->
            <div class="col-md-4">
                <div class="card shadow-sm border-0 rounded-4 text-center h-100">
                    <div class="card-body py-5">

                        <!-- Aquí muestro la cantidad de proyectos -->
                        <h2 class="h1 fw-bold mb-2">{{ total_proyectos }}</h2>

                        <p class="fs-3 mb-0">Proyectos</p>
                    </div>
                </div>
            </div>

            <!-- Aquí muestro el widget de tareas -->
            <div class="col-md-4">
                <div class="card shadow-sm border-0 rounded-4 text-center h-100">
                    <div class="card-body py-5">

                        <!-- Aquí muestro la cantidad de tareas -->
                        <h2 class="h1 fw-bold mb-2">{{ total_tareas }}</h2>

                        <p class="fs-3 mb-0">Tareas</p>
                    </div>
                </div>
            </div>

            <!-- Aquí muestro el widget de tareas pendientes -->
            <div class="col-md-4">
                <div class="card shadow-sm border-0 rounded-4 text-center h-100">
                    <div class="card-body py-5">

                        <!-- Aquí muestro la cantidad de tareas pendientes -->
                        <h2 class="h1 fw-bold mb-2">{{ pendientes }}</h2>

                        <p class="fs-3 mb-0">Pendientes</p>
                    </div>
                </div>
            </div>

        </div>

        <!-- Aquí agrego botones según si el usuario está autenticado -->
        <div class="text-center">

            {% if user.is_authenticated %}

                <!-- Aquí muestro botón para ir al dashboard -->
                <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg rounded-3 me-2">
                    Ir al dashboard
                </a>

            {% else %}

                <!-- Aquí muestro botón para iniciar sesión -->
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg rounded-3">
                    Iniciar sesión
                </a>

            {% endif %}

        </div>

    </div>

</body>
</html>
