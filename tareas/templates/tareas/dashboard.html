<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- Aquí defino el título que aparecerá en la pestaña del navegador -->
    <title>Dashboard</title>
</head>
<body>

    <!-- Aquí muestro un enlace para volver a la página principal -->
    <a href="{% url 'home' %}">Inicio</a>

    <!-- Aquí creo un formulario pequeño para cerrar sesión correctamente con método POST -->
    <form method="post" action="{% url 'logout' %}" style="display:inline;">
        {% csrf_token %}

        <!-- Aquí agrego el botón para cerrar la sesión del usuario -->
        <button type="submit">Cerrar sesión</button>
    </form>

    <!-- Aquí muestro el título principal del dashboard -->
    <h1>Panel del Usuario</h1>

    <!-- Aquí le doy la bienvenida al usuario que inició sesión -->
    <p>Bienvenido {{ user.username }}.</p>

    <!-- Aquí muestro un mensaje indicando que esta es una vista protegida -->
    <p>Esta página solo está disponible para usuarios autenticados.</p>

</body>
</html>
