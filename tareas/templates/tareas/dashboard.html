<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- Aquí defino el título que aparecerá en la pestaña del navegador -->
    <title>Dashboard</title>

    <!-- Aquí conecto Bootstrap para mejorar el diseño visual de la página -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Aquí creo un contenedor principal con espacio superior -->
    <div class="container mt-5">

        <!-- Aquí creo una fila para ordenar el contenido -->
        <div class="row justify-content-center">

            <!-- Aquí defino una columna centrada para el contenido del dashboard -->
            <div class="col-md-8 col-lg-6">

                <!-- Aquí creo una tarjeta para mostrar el panel del usuario -->
                <div class="card shadow-sm border-0 rounded-4">

                    <!-- Aquí defino el cuerpo principal de la tarjeta -->
                    <div class="card-body p-4">

                        <!-- Aquí creo una barra simple con enlaces de navegación -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <a href="{% url 'home' %}" class="text-decoration-none">← Volver al inicio</a>

                            <!-- Aquí creo un formulario pequeño para cerrar sesión correctamente con método POST -->
                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}

                                <!-- Aquí agrego el botón para cerrar la sesión del usuario -->
                                <button type="submit" class="btn btn-outline-danger btn-sm">Cerrar sesión</button>
                            </form>
                        </div>

                        <!-- Aquí muestro el título principal del dashboard -->
                        <h1 class="text-center mb-3">Panel del Usuario</h1>

                        <!-- Aquí muestro una bienvenida al usuario autenticado -->
                        <p class="text-center fs-5">Bienvenido <strong>{{ user.username }}</strong>.</p>

                        <!-- Aquí muestro un mensaje informativo sobre la protección de esta vista -->
                        <p class="text-center text-muted mb-4">
                            Esta página solo está disponible para usuarios autenticados.
                        </p>

                        <!-- Aquí agrego una pequeña tarjeta interna como apoyo visual -->
                        <div class="alert alert-primary text-center rounded-3 mb-0">
                            Has iniciado sesión correctamente en tu panel protegido.
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
