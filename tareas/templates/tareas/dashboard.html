<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- Aquí defino el título que aparecerá en la pestaña del navegador -->
    <title>Dashboard</title>

    <!-- Aquí conecto Bootstrap para mejorar el diseño visual de mi página -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Aquí creo un contenedor principal con margen superior -->
    <div class="container mt-5">

        <!-- Aquí centro el contenido en la página -->
        <div class="row justify-content-center">

            <!-- Aquí defino el ancho de la tarjeta del dashboard -->
            <div class="col-md-8 col-lg-6">

                <!-- Aquí creo una tarjeta visual para mostrar el panel del usuario -->
                <div class="card shadow-sm border-0 rounded-4">

                    <!-- Aquí defino el cuerpo principal de la tarjeta -->
                    <div class="card-body p-4">

                        <!-- Aquí creo una fila superior con acceso al inicio y cierre de sesión -->
                        <div class="d-flex justify-content-between align-items-center mb-4">

                            <!-- Aquí muestro un enlace para volver a la página principal -->
                            <a href="{% url 'home' %}" class="text-decoration-none">← Volver al inicio</a>

                            <!-- Aquí creo un formulario para cerrar sesión con método POST -->
                            <form method="post" action="{% url 'logout' %}" class="mb-0">
                                {% csrf_token %}

                                <!-- Aquí agrego el botón para cerrar la sesión del usuario -->
                                <button type="submit" class="btn btn-outline-danger btn-sm rounded-3">
                                    Cerrar sesión
                                </button>
                            </form>
                        </div>

                        <!-- Aquí muestro el título principal del dashboard -->
                        <h1 class="text-center mb-3">Panel del Usuario</h1>

                        <!-- Aquí muestro un mensaje de bienvenida al usuario autenticado -->
                        <p class="text-center fs-5 mb-2">
                            Bienvenido <strong>{{ user.username }}</strong>
                        </p>

                        <!-- Aquí muestro un mensaje que explica que esta vista está protegida -->
                        <p class="text-center text-muted mb-4">
                            Esta página solo está disponible para usuarios autenticados.
                        </p>

                        <!-- Aquí agrego una alerta visual para reforzar que el acceso fue correcto -->
                        <div class="alert alert-success text-center rounded-3 mb-0">
                            He iniciado sesión correctamente y accedí a una vista protegida con decoradores de Django.
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
