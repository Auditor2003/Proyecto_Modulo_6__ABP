<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- Aquí defino el título que veré en la pestaña del navegador -->
    <title>Login</title>

    <!-- Aquí conecto Bootstrap para darle un diseño más bonito a mi página -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Aquí creo un contenedor principal con margen superior -->
    <div class="container mt-5">

        <!-- Aquí centro el contenido en la página -->
        <div class="row justify-content-center">

            <!-- Aquí defino el ancho de la tarjeta del login -->
            <div class="col-md-6 col-lg-5">

                <!-- Aquí creo una tarjeta visual para que el login se vea más ordenado -->
                <div class="card shadow-sm border-0 rounded-4">

                    <!-- Aquí defino el cuerpo de la tarjeta -->
                    <div class="card-body p-4">

                        <!-- Aquí muestro un enlace para volver al inicio -->
                        <div class="mb-3">
                            <a href="{% url 'home' %}" class="text-decoration-none">← Volver al inicio</a>
                        </div>

                        <!-- Aquí muestro el título principal del formulario -->
                        <h1 class="h2 text-center mb-4">Inicio de Sesión</h1>

                        <!-- Aquí muestro errores generales del formulario si existen -->
                        {% if form.errors %}
                            <div class="alert alert-danger">
                                Mi usuario o contraseña no son correctos. Inténtalo nuevamente.
                            </div>
                        {% endif %}

                        <!-- Aquí creo el formulario de login -->
                        <form method="post">
                            {% csrf_token %}

                            <!-- Aquí muestro el campo del nombre de usuario -->
                            <div class="mb-3">
                                <label for="{{ form.username.id_for_label }}" class="form-label">Nombre de usuario</label>
                                {{ form.username }}
                            </div>

                            <!-- Aquí muestro el campo de la contraseña -->
                            <div class="mb-3">
                                <label for="{{ form.password.id_for_label }}" class="form-label">Contraseña</label>
                                {{ form.password }}
                            </div>

                            <!-- Aquí agrego el botón para iniciar sesión -->
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg rounded-3">Ingresar</button>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
