<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- Aquí defino el título base -->
    <title>{% block title %}Gestor{% endblock %}</title>

    <!-- Aquí cargo Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Aquí creo una barra superior común -->
<nav class="navbar navbar-light bg-white shadow-sm px-4">

    <!-- Aquí dejo acceso al inicio -->
    <a href="{% url 'home' %}" class="navbar-brand">
        Inicio
    </a>

    <!-- Aquí verifico si el usuario está autenticado -->
    {% if user.is_authenticated %}

        <!-- Aquí muestro el nombre del usuario -->
        <span class="me-3">Hola {{ user.username }}</span>

        <!-- Aquí dejo botón logout para TODAS las vistas -->
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger btn-sm">
                Cerrar sesión
            </button>
        </form>

    {% else %}

        <!-- Aquí dejo acceso al login si no está logueado -->
        <a href="{% url 'login' %}" class="btn btn-primary btn-sm">
            Iniciar sesión
        </a>

    {% endif %}

</nav>

<!-- Aquí dejo el contenido dinámico -->
<div class="container py-5">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
